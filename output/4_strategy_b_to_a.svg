<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="1920" height="1080" fill="#13102b" />
  <line x1="100" y1="0" x2="100" y2="1080" stroke="#221d5c" stroke-width="1" />
  <line x1="300" y1="0" x2="300" y2="1080" stroke="#221d5c" stroke-width="1" />
  <line x1="500" y1="0" x2="500" y2="1080" stroke="#221d5c" stroke-width="1" />
  <line x1="700" y1="0" x2="700" y2="1080" stroke="#221d5c" stroke-width="1" />
  <line x1="900" y1="0" x2="900" y2="1080" stroke="#221d5c" stroke-width="1" />
  <line x1="1100" y1="0" x2="1100" y2="1080" stroke="#221d5c" stroke-width="1" />
  <line x1="1300" y1="0" x2="1300" y2="1080" stroke="#221d5c" stroke-width="1" />
  <line x1="1500" y1="0" x2="1500" y2="1080" stroke="#221d5c" stroke-width="1" />
  <line x1="1700" y1="0" x2="1700" y2="1080" stroke="#221d5c" stroke-width="1" />
  <line x1="1900" y1="0" x2="1900" y2="1080" stroke="#221d5c" stroke-width="1" />
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#221d5c" stroke-width="1" />
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#221d5c" stroke-width="1" />
  <line x1="0" y1="500" x2="1200" y2="500" stroke="#221d5c" stroke-width="1" />
  <line x1="0" y1="700" x2="1200" y2="700" stroke="#221d5c" stroke-width="1" />
  <line x1="0" y1="900" x2="1200" y2="900" stroke="#221d5c" stroke-width="1" />
  <rect x="50" y="40" width="1820" height="110" rx="12" fill="#221d5c" stroke="#a855f7" stroke-width="2" />
  <rect x="50" y="40" width="15" height="110" fill="#c084fc" />
  <text x="90" y="73" fill="#f5f3ff" font-family="Microsoft JhengHei, sans-serif" font-size="18" font-weight="bold" text-anchor="start">會考數學科等級晉升</text>
  <text x="90" y="114" fill="#faf5ff" font-family="Microsoft JhengHei, sans-serif" font-size="32" font-weight="bold" text-anchor="start">從 B 到 A 精熟策略：攻克進階與非選</text>
  <rect x="50" y="170" width="1820" height="60" rx="8" fill="#6b21a8" />
  <text x="960" y="208" fill="#ffffff" font-family="Microsoft JhengHei, sans-serif" font-size="20" font-weight="bold" text-anchor="middle">🎯 精準目標：選擇題錯 2 ~ 4 題內，非選拿 4 ~ 6 分，勇奪 A 等級！</text>
  <rect x="50" y="250" width="930" height="780" rx="12" fill="#221d5c" stroke="#a855f7" stroke-width="1" />
  <text x="80" y="297" fill="#c084fc" font-family="Microsoft JhengHei, sans-serif" font-size="22" font-weight="bold" text-anchor="start">🎯 核心突破：攻克這 5 大「決勝鑑別度」高難度單元</text>
  <rect x="80" y="330" width="870" height="110" rx="8" fill="#13102b" stroke="#a855f7" stroke-width="1" />
  <rect x="80" y="330" width="8" height="110" fill="#c084fc" />
  <text x="105" y="363" fill="#c084fc" font-family="Microsoft JhengHei, sans-serif" font-size="18" font-weight="bold" text-anchor="start">1. 三角形與多邊形性質 (平行與摺疊)</text>
  <text x="105" y="389" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="14" font-weight="normal" text-anchor="start">平行線與截角定理、特殊四邊形長度/角度。常與摺疊對稱結合考角度變化。</text>
  <rect x="80" y="460" width="870" height="110" rx="8" fill="#13102b" stroke="#a855f7" stroke-width="1" />
  <rect x="80" y="460" width="8" height="110" fill="#c084fc" />
  <text x="105" y="493" fill="#c084fc" font-family="Microsoft JhengHei, sans-serif" font-size="18" font-weight="bold" text-anchor="start">2. 圓的性質 (切線與圓角)</text>
  <text x="105" y="519" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="14" font-weight="normal" text-anchor="start">九上核心。圓周角與切線推導、弦心距與弧長。是高鑑別度題目的常客。</text>
  <rect x="80" y="590" width="870" height="110" rx="8" fill="#13102b" stroke="#a855f7" stroke-width="1" />
  <rect x="80" y="590" width="8" height="110" fill="#c084fc" />
  <text x="105" y="623" fill="#c084fc" font-family="Microsoft JhengHei, sans-serif" font-size="18" font-weight="bold" text-anchor="start">3. 三角形全等與相似</text>
  <text x="105" y="649" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="14" font-weight="normal" text-anchor="start">九上核心。相似判定性質與比例線段結合。此為非選幾何證明的核心考點。</text>
  <rect x="80" y="720" width="870" height="110" rx="8" fill="#13102b" stroke="#a855f7" stroke-width="1" />
  <rect x="80" y="720" width="8" height="110" fill="#818cf8" />
  <text x="105" y="753" fill="#818cf8" font-family="Microsoft JhengHei, sans-serif" font-size="18" font-weight="bold" text-anchor="start">4. 三角形三心 (外心、內心、重心)</text>
  <text x="105" y="779" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="14" font-weight="normal" text-anchor="start">九上核心。掌握三心定義與性質（如重心2:1、內心到三邊等距、外心外接圓）。</text>
  <rect x="80" y="850" width="870" height="110" rx="8" fill="#13102b" stroke="#a855f7" stroke-width="1" />
  <rect x="80" y="850" width="8" height="110" fill="#818cf8" />
  <text x="105" y="883" fill="#818cf8" font-family="Microsoft JhengHei, sans-serif" font-size="18" font-weight="bold" text-anchor="start">5. 二次函數與圖形對稱極值</text>
  <text x="105" y="909" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="14" font-weight="normal" text-anchor="start">九下單元。配方法求頂點、對稱性、平移與交點。常結合生活軌跡考極值。</text>
  <rect x="1010" y="250" width="860" height="780" rx="12" fill="#221d5c" stroke="#a855f7" stroke-width="1" />
  <text x="1040" y="297" fill="#c084fc" font-family="Microsoft JhengHei, sans-serif" font-size="22" font-weight="bold" text-anchor="start">📋 B 到 A 實戰高分拿分指南</text>
  <rect x="1040" y="330" width="790" height="140" rx="8" fill="#13102b" stroke="#a855f7" stroke-width="1" />
  <rect x="1040" y="330" width="8" height="140" fill="#c084fc" />
  <rect x="1065" y="345" width="80" height="26" rx="4" fill="#c084fc" />
  <text x="1105" y="364" fill="#13102b" font-family="Microsoft JhengHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">指南一</text>
  <text x="1160" y="366" fill="#c084fc" font-family="Microsoft JhengHei, sans-serif" font-size="18" font-weight="bold" text-anchor="start">非選題作答步驟化，力求緊扣「定理與邏輯」</text>
  <text x="1065" y="399" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="14" font-weight="normal" text-anchor="start">幾何題作答不可僅列算式，必須寫出『因為...，所以...』並註明使用的幾何定理。代數應用題也需寫下變數假設與最終合理</text>
  <text x="1065" y="417.2" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="14" font-weight="normal" text-anchor="start">性檢驗，以防遭酌扣1分。</text>
  <rect x="1040" y="490" width="790" height="140" rx="8" fill="#13102b" stroke="#a855f7" stroke-width="1" />
  <rect x="1040" y="490" width="8" height="140" fill="#c084fc" />
  <rect x="1065" y="505" width="80" height="26" rx="4" fill="#c084fc" />
  <text x="1105" y="524" fill="#13102b" font-family="Microsoft JhengHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">指南二</text>
  <text x="1160" y="526" fill="#c084fc" font-family="Microsoft JhengHei, sans-serif" font-size="18" font-weight="bold" text-anchor="start">建立「幾何輔助線」反射，破解幾何題卡關</text>
  <text x="1065" y="559" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="14" font-weight="normal" text-anchor="start">後半段幾何多需輔助線。平時練習應建立反射動作：看到切線連接圓心與切點（垂直）；看到中點構造中線或平行線。多</text>
  <text x="1065" y="577.2" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="14" font-weight="normal" text-anchor="start">尋找相似形或直角三角形。</text>
  <rect x="1040" y="650" width="790" height="140" rx="8" fill="#13102b" stroke="#a855f7" stroke-width="1" />
  <rect x="1040" y="650" width="8" height="140" fill="#818cf8" />
  <rect x="1065" y="665" width="80" height="26" rx="4" fill="#818cf8" />
  <text x="1105" y="684" fill="#13102b" font-family="Microsoft JhengHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">指南三</text>
  <text x="1160" y="686" fill="#818cf8" font-family="Microsoft JhengHei, sans-serif" font-size="18" font-weight="bold" text-anchor="start">建立錯題本，深度挖掘「錯題的考點本質」</text>
  <text x="1065" y="719" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="14" font-weight="normal" text-anchor="start">從 B 到 A 的關鍵在於不犯相同錯誤。將寫錯的題目整理至錯題本中，用紅筆標記出『這題考了什麼隱藏觀念』、『我的盲</text>
  <text x="1065" y="737.2" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="14" font-weight="normal" text-anchor="start">點在哪』。考前反覆溫習。</text>
  <rect x="1040" y="810" width="790" height="140" rx="8" fill="#13102b" stroke="#a855f7" stroke-width="1" />
  <rect x="1040" y="810" width="8" height="140" fill="#818cf8" />
  <rect x="1065" y="825" width="80" height="26" rx="4" fill="#818cf8" />
  <text x="1105" y="844" fill="#13102b" font-family="Microsoft JhengHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">指南四</text>
  <text x="1160" y="846" fill="#818cf8" font-family="Microsoft JhengHei, sans-serif" font-size="18" font-weight="bold" text-anchor="start">一題多解與限速訓練，提升考場解題應變力</text>
  <text x="1065" y="879" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="14" font-weight="normal" text-anchor="start">平時練習對同一個幾何題想出兩種不同解法（如坐標化 vs 相似比），建立多元思路。並在模考時強迫自己縮短前15題時</text>
  <text x="1065" y="897.2" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="14" font-weight="normal" text-anchor="start">間，保留精力給難題。</text>
</svg>
