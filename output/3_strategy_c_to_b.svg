<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1800" viewBox="0 0 1200 1800">
  <rect width="1200" height="1800" fill="#27120c" />
  <line x1="100" y1="0" x2="100" y2="1800" stroke="#4a1c12" stroke-width="1" />
  <line x1="300" y1="0" x2="300" y2="1800" stroke="#4a1c12" stroke-width="1" />
  <line x1="500" y1="0" x2="500" y2="1800" stroke="#4a1c12" stroke-width="1" />
  <line x1="700" y1="0" x2="700" y2="1800" stroke="#4a1c12" stroke-width="1" />
  <line x1="900" y1="0" x2="900" y2="1800" stroke="#4a1c12" stroke-width="1" />
  <line x1="1100" y1="0" x2="1100" y2="1800" stroke="#4a1c12" stroke-width="1" />
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#4a1c12" stroke-width="1" />
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#4a1c12" stroke-width="1" />
  <line x1="0" y1="500" x2="1200" y2="500" stroke="#4a1c12" stroke-width="1" />
  <line x1="0" y1="700" x2="1200" y2="700" stroke="#4a1c12" stroke-width="1" />
  <line x1="0" y1="900" x2="1200" y2="900" stroke="#4a1c12" stroke-width="1" />
  <line x1="0" y1="1100" x2="1200" y2="1100" stroke="#4a1c12" stroke-width="1" />
  <line x1="0" y1="1300" x2="1200" y2="1300" stroke="#4a1c12" stroke-width="1" />
  <line x1="0" y1="1500" x2="1200" y2="1500" stroke="#4a1c12" stroke-width="1" />
  <line x1="0" y1="1700" x2="1200" y2="1700" stroke="#4a1c12" stroke-width="1" />
  <rect x="50" y="50" width="1100" height="180" rx="12" fill="#4a1c12" stroke="#f87171" stroke-width="2" />
  <rect x="50" y="50" width="15" height="180" fill="#fb923c" />
  <text x="90" y="104" fill="#fecdd3" font-family="Microsoft JhengHei, sans-serif" font-size="24" font-weight="bold" text-anchor="start">會考數學等級晉升</text>
  <text x="90" y="162" fill="#fff7ed" font-family="Microsoft JhengHei, sans-serif" font-size="42" font-weight="bold" text-anchor="start">從 C 到 B 突破策略：固守基本分</text>
  <rect x="50" y="260" width="1100" height="90" rx="8" fill="#b91c1c" />
  <text x="600" y="316" fill="#ffffff" font-family="Microsoft JhengHei, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">🎯 精準目標：答對 10 ~ 13 題，即可成功脫 C 達 B！</text>
  <rect x="50" y="380" width="1100" height="700" rx="12" fill="#4a1c12" stroke="#f87171" stroke-width="1" />
  <text x="80" y="434" fill="#fb923c" font-family="Microsoft JhengHei, sans-serif" font-size="24" font-weight="bold" text-anchor="start">🎯 衝刺複習：主攻這 6 個「高頻且好拿分」基礎單元</text>
  <rect x="80" y="470" width="500" height="160" rx="8" fill="#27120c" stroke="#f87171" stroke-width="1" />
  <rect x="80" y="470" width="8" height="160" fill="#f87171" />
  <text x="105" y="510" fill="#f87171" font-family="Microsoft JhengHei, sans-serif" font-size="20" font-weight="bold" text-anchor="start">1. 數線與數的運算</text>
  <text x="105" y="546" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">七上第一單元。考正負數運算、絕對值大小、分配律簡化計算。</text>
  <text x="105" y="566.8" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">是全卷最簡單的第一題出處。</text>
  <rect x="610" y="470" width="500" height="160" rx="8" fill="#27120c" stroke="#f87171" stroke-width="1" />
  <rect x="610" y="470" width="8" height="160" fill="#f87171" />
  <text x="635" y="510" fill="#f87171" font-family="Microsoft JhengHei, sans-serif" font-size="20" font-weight="bold" text-anchor="start">2. 科學記號與指數</text>
  <text x="635" y="546" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">七上第一單元。考十的次方大小比較、大數估算。概念單純，多</text>
  <text x="635" y="566.8" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">加練習即可拿分。</text>
  <rect x="80" y="660" width="500" height="160" rx="8" fill="#27120c" stroke="#f87171" stroke-width="1" />
  <rect x="80" y="660" width="8" height="160" fill="#f87171" />
  <text x="105" y="700" fill="#f87171" font-family="Microsoft JhengHei, sans-serif" font-size="20" font-weight="bold" text-anchor="start">3. 因數與倍數</text>
  <text x="105" y="736" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">七上第二單元。考質數判斷、最大公因數與最小公倍數。多結合</text>
  <text x="105" y="756.8" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">日常情境（如拼貼紙片）。</text>
  <rect x="610" y="660" width="500" height="160" rx="8" fill="#27120c" stroke="#f87171" stroke-width="1" />
  <rect x="610" y="660" width="8" height="160" fill="#fb923c" />
  <text x="635" y="700" fill="#fb923c" font-family="Microsoft JhengHei, sans-serif" font-size="20" font-weight="bold" text-anchor="start">4. 直角坐標與圖形</text>
  <text x="635" y="736" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">七下第一單元。考象限判斷、讀取坐標點。通常配合幾何點移動</text>
  <text x="635" y="756.8" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">，是看圖說故事的拿分題。</text>
  <rect x="80" y="850" width="500" height="160" rx="8" fill="#27120c" stroke="#f87171" stroke-width="1" />
  <rect x="80" y="850" width="8" height="160" fill="#fb923c" />
  <text x="105" y="890" fill="#fb923c" font-family="Microsoft JhengHei, sans-serif" font-size="20" font-weight="bold" text-anchor="start">5. 二元一次聯立方程式</text>
  <text x="105" y="926" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">七下第一單元。考解聯立方程式，或極簡單的生活代數列式。熟</text>
  <text x="105" y="946.8" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">記消去法即可穩拿分。</text>
  <rect x="610" y="850" width="500" height="160" rx="8" fill="#27120c" stroke="#f87171" stroke-width="1" />
  <rect x="610" y="850" width="8" height="160" fill="#fb923c" />
  <text x="635" y="890" fill="#fb923c" font-family="Microsoft JhengHei, sans-serif" font-size="20" font-weight="bold" text-anchor="start">6. 統計圖表與數據</text>
  <text x="635" y="926" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">九下單元。考直方圖、折線圖判讀，或是找出眾數與中位數。這</text>
  <text x="635" y="946.8" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">是純閱讀圖表即可得分的送分題。</text>
  <rect x="50" y="1110" width="1100" height="640" rx="12" fill="#4a1c12" stroke="#f87171" stroke-width="1" />
  <text x="80" y="1164" fill="#fb923c" font-family="Microsoft JhengHei, sans-serif" font-size="24" font-weight="bold" text-anchor="start">📋 C 到 B 衝刺實戰拿分指南</text>
  <rect x="80" y="1200" width="1040" height="150" rx="8" fill="#27120c" stroke="#f87171" stroke-width="1" />
  <rect x="100" y="1220" width="100" height="36" rx="5" fill="#fb923c" />
  <text x="150" y="1243" fill="#27120c" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">指南一</text>
  <text x="220" y="1244" fill="#fb923c" font-family="Microsoft JhengHei, sans-serif" font-size="20" font-weight="bold" text-anchor="start">果斷放棄難題！把時間留給前面 15 題</text>
  <text x="100" y="1286" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">會考數學後段（16-25題）多是複雜的幾何相似、證明或圓形題目，對C級同學太耗時。請在考場上果斷跳過，將省下的時間全部用來反覆檢查</text>
  <text x="100" y="1306.8" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">前 15 題，確保寫過的題目絕對能拿分。</text>
  <rect x="80" y="1370" width="1040" height="150" rx="8" fill="#27120c" stroke="#f87171" stroke-width="1" />
  <rect x="100" y="1390" width="100" height="36" rx="5" fill="#fb923c" />
  <text x="150" y="1413" fill="#27120c" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">指南二</text>
  <text x="220" y="1414" fill="#fb923c" font-family="Microsoft JhengHei, sans-serif" font-size="20" font-weight="bold" text-anchor="start">杜絕粗心！寫完立刻用「簡單代值」驗算</text>
  <text x="100" y="1456" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">待加強 (C) 的同學往往不是不會，而是死在計算錯誤（如負負忘記得正、乘法分配律少乘一項）。寫完一題方程式或算式題，立刻將算出答案</text>
  <text x="100" y="1476.8" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">代回原式子中，確認左右兩邊相等，確防粗心。</text>
  <rect x="80" y="1540" width="1040" height="150" rx="8" fill="#27120c" stroke="#f87171" stroke-width="1" />
  <rect x="100" y="1560" width="100" height="36" rx="5" fill="#fb923c" />
  <text x="150" y="1583" fill="#27120c" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="bold" text-anchor="middle">指南三</text>
  <text x="220" y="1584" fill="#fb923c" font-family="Microsoft JhengHei, sans-serif" font-size="20" font-weight="bold" text-anchor="start">非選題大膽作答！哪怕只寫『假設未知數』</text>
  <text x="100" y="1626" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">非選擇題第一題多是代數應用題。即使不會解題，也必須用中文寫下：『設未知數 x 為...，設 y 為...』並試著照題目文字寫出算式。會考非選只</text>
  <text x="100" y="1646.8" fill="#cbd5e1" font-family="Microsoft JhengHei, sans-serif" font-size="16" font-weight="normal" text-anchor="start">要有合理的假設與列式，就能拿到 1 分，這 1 分往往是脫 C 的關鍵！</text>
</svg>
